name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 checkout
        uses: actions/checkout@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 & push
        run: |
          docker build -t nadaa97/atfeelog-backend:latest .
          docker push nadaa97/atfeelog-backend:latest

      - name: application.yml 생성
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p ~/atfeelog-backend/src/main/resources
            cat > ~/atfeelog-backend/src/main/resources/application.yml << EOF
            spring:
              servlet:
                multipart:
                  max-file-size: 10MB
                  max-request-size: 10MB
              datasource:
                url: jdbc:postgresql://db.pcsbfbstuewcnzufsxod.supabase.co:5432/postgres
                username: postgres
                password: ${{ secrets.DB_PASSWORD }}
                driver-class-name: org.postgresql.Driver
              jpa:
                database-platform: org.hibernate.dialect.PostgreSQLDialect
                hibernate:
                  ddl-auto: update
                show-sql: true
                properties:
                  hibernate:
                    format_sql: true
              graphql:
                graphiql:
                  enabled: true
                path: /graphql
            jwt:
              issuer: ${{ secrets.JWT_ISSUER }}
              secret_key: ${{ secrets.JWT_SECRET_KEY }}
            cloud:
              aws:
                s3:
                  bucket: ${{ secrets.AWS_S3_BUCKET }}
                credentials:
                  access-key: ${{ secrets.AWS_ACCESS_KEY }}
                  secret-key: ${{ secrets.AWS_SECRET_KEY }}
                region:
                  static: ap-northeast-2
            EOF

      - name: VM에 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/atfeelog-backend
            git pull origin main
            cat > .env << EOF
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF
            docker compose pull app
            docker compose up -d
